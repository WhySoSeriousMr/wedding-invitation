<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Свадебное приглашение</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            font-family:'Georgia', serif;
            background:#f8f4ef;
            color:#3a2e26;
            overflow-x:hidden;
        }

        section{
            padding:100px 20px;
            text-align:center;
        }

        .hero{
            height:100vh;
            background:
                linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.35)),
                url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1920&q=80')
                center/cover no-repeat;
            display:flex;
            justify-content:center;
            align-items:center;
            color:white;
        }

        .hero-content{
            animation:fadeIn 2s ease;
        }

        .hero h1{
            font-size:5rem;
            letter-spacing:5px;
            margin-bottom:20px;
        }

        .hero p{
            font-size:1.5rem;
            margin-bottom:30px;
        }

        .date{
            font-size:2rem;
            border:2px solid white;
            display:inline-block;
            padding:15px 35px;
            border-radius:50px;
        }

        h2{
            font-size:3rem;
            margin-bottom:40px;
            color:#8c6b4f;
        }

        .countdown-container{
            display:flex;
            justify-content:center;
            gap:30px;
            flex-wrap:wrap;
        }

        .count-box{
            width:150px;
            height:150px;
            background:white;
            border-radius:25px;
            box-shadow:0 15px 35px rgba(0,0,0,.1);
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .count-box span:first-child{
            font-size:3rem;
            font-weight:bold;
            color:#8c6b4f;
        }

        .details{
            background:#fff;
        }

        .details-card{
            max-width:700px;
            margin:auto;
            background:#fdfaf7;
            padding:50px;
            border-radius:30px;
            box-shadow:0 10px 40px rgba(0,0,0,.08);
        }

        .details-card p{
            font-size:1.3rem;
            margin:20px 0;
        }

        .gallery{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:20px;
            margin-top:50px;
        }

        .gallery img{
            width:100%;
            height:400px;
            object-fit:cover;
            border-radius:25px;
            transition:.4s;
        }

        .gallery img:hover{
            transform:scale(1.05);
        }

        form{
            max-width:500px;
            margin:auto;
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        input, select{
            padding:18px;
            border:none;
            border-radius:15px;
            font-size:1rem;
            box-shadow:0 5px 20px rgba(0,0,0,.08);
        }

        button{
            padding:18px;
            border:none;
            border-radius:15px;
            background:#8c6b4f;
            color:white;
            font-size:1.1rem;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#6f543e;
            transform:translateY(-3px);
        }

        footer{
            background:#3a2e26;
            color:white;
            padding:50px 20px;
            text-align:center;
        }

        .music-btn{
    position: fixed;
    top: 30px;
    right: 30px;
    width: 60px;
    height: 60px;
    border: none;
    border-radius: 50%;
    background: rgba(140, 107, 79, 0.95);
    color: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
    cursor: pointer;
    z-index: 1000;
    font-size: 1.4rem;
    transition: all 0.3s ease;
}

.music-btn:hover{
    background: rgba(111, 84, 62, 1);
    transform: scale(1.08);
}

.music-btn i{
    color: white;
}

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:768px){
            .hero h1{
                font-size:3rem;
            }

            h2{
                font-size:2.2rem;
            }
        }
    </style>
</head>
<body>

    <button class="music-btn" id="musicBtn">
        <i class="fas fa-music"></i>
    </button>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <section class="hero">
        <div class="hero-content">
            <h1>Арман & Сәнбибі</h1>
            <p>Приглашаем Вас на нашу свадьбу</p>
            <div class="date">15 Августа 2026</div>
        </div>
    </section>

    <section>
        <h2>До нашей свадьбы осталось</h2>
        <div class="countdown-container">
            <div class="count-box">
                <span id="days">0</span>
                <span>Дней</span>
            </div>
            <div class="count-box">
                <span id="hours">0</span>
                <span>Часов</span>
            </div>
            <div class="count-box">
                <span id="minutes">0</span>
                <span>Минут</span>
            </div>
            <div class="count-box">
                <span id="seconds">0</span>
                <span>Секунд</span>
            </div>
        </div>
    </section>

    <section class="details">
        <h2>Детали торжества</h2>
        <div class="details-card">
            <p><i class="fas fa-calendar"></i> 15 августа 2026</p>
            <p><i class="fas fa-clock"></i> 18:00</p>
            <p><i class="fas fa-map-marker-alt"></i> Grand Hall, Алматы</p>
        </div>
    </section>

    <section>
        <h2>Наша история</h2>
        <div class="gallery">
            <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=800&q=80">
            <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=800&q=80">
            <img src="https://images.unsplash.com/photo-1516589091380-5d8e87df6999?auto=format&fit=crop&w=800&q=80">
        </div>
    </section>

    <section>
        <h2>Подтвердите присутствие</h2>
        <form>
            <input type="text" placeholder="Ваше имя" required>
            <select required>
                <option>Я обязательно приду</option>
                <option>К сожалению, не смогу</option>
            </select>
            <button type="submit">Отправить</button>
        </form>
    </section>

    <footer>
        <h2 style="color:white;">Ждём Вас!</h2>
        <p>С любовью, Арман и Сәнбибі</p>
    </footer>

    <script>
        const targetDate = new Date("August 15, 2026 18:00:00").getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            document.getElementById('days').innerText =
                Math.floor(diff / (1000 * 60 * 60 * 24));

            document.getElementById('hours').innerText =
                Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));

            document.getElementById('minutes').innerText =
                Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            document.getElementById('seconds').innerText =
                Math.floor((diff % (1000 * 60)) / 1000);
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');

        btn.addEventListener('click', () => {
            if (music.paused) {
                music.play();
                btn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                music.pause();
                btn.innerHTML = '<i class="fas fa-music"></i>';
            }
        });
    </script>

</body>
</html>
